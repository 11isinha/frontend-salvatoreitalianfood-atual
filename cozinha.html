<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Salvatore - Pedidos</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vinho: '#9E2A2B',
            verde: '#2F5D3A',
            creme: '#FFFFFF'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-creme font-sans">

  <!-- HEADER -->
  <div class="flex items-center justify-between bg-verde text-white px-6 py-4 shadow-lg">
    
    <div class="flex items-center gap-4">
      <img src="images/logo2.webp" alt="Salvatore"
        class="w-16 h-16 rounded-xl shadow-md border-2 border-white">

      <div>
        <h1 class="text-xl font-bold tracking-wide">Salvatore</h1>
        <p class="text-sm text-green-200">Italian Food • 1995</p>

        <!-- STATUS -->
        <div id="status" class="text-sm mt-1 flex items-center gap-2">
          <span class="w-2 h-2 bg-red-400 rounded-full"></span>
          Offline
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <!-- BOTÃO ONLINE/OFFLINE -->
      <button id="btnStatus" onclick="toggleStatus()"
        class="bg-white text-verde px-4 py-2 rounded-lg shadow font-semibold">
        Ficar Online
      </button>

      <!-- BOTÃO ATUALIZAR -->
      <button onclick="carregarPedidos()"
        class="bg-vinho hover:bg-red-800 px-5 py-2 rounded-lg shadow">
        Atualizar
      </button>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="p-6">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-semibold text-verde">
        Pedidos Recebidos
      </h2>

      <span id="contador"
        class="bg-vinho text-white px-4 py-1 rounded-full text-sm shadow">
        0 pedidos
      </span>
    </div>

    <div id="pedidosContainer"
      class="grid gap-5 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
    </div>

  </div>

  <script>
    let estaOnline = false;

    function atualizarStatusVisual() {
      const status = document.getElementById("status");
      const btn = document.getElementById("btnStatus");

      if (estaOnline) {
        status.innerHTML = `
          <span class="w-2 h-2 bg-green-400 rounded-full"></span>
          Online
        `;

        btn.innerText = "Ficar Offline";
        btn.className = "bg-red-500 text-white px-4 py-2 rounded-lg shadow font-semibold";

      } else {
        status.innerHTML = `
          <span class="w-2 h-2 bg-red-400 rounded-full"></span>
          Offline
        `;

        btn.innerText = "Ficar Online";
        btn.className = "bg-white text-verde px-4 py-2 rounded-lg shadow font-semibold";
      }
    }

    function toggleStatus() {
      estaOnline = !estaOnline;
      atualizarStatusVisual();

      if (estaOnline) {
        carregarPedidos(); // já busca quando ficar online
      }
    }

    function renderPedidos(pedidos) {
      const container = document.getElementById("pedidosContainer");
      const contador = document.getElementById("contador");

      container.innerHTML = "";

      if (!pedidos || pedidos.length === 0) {
        container.innerHTML = `
          <div class="bg-red-100 border border-red-300 text-red-800 p-4 rounded-lg shadow col-span-full">
            Nenhum pedido no momento 🍝
          </div>
        `;
        contador.innerText = "0 pedidos";
        return;
      }

      pedidos.forEach(pedido => {
        const card = document.createElement("div");

        card.className = `
          bg-white/80 backdrop-blur rounded-xl p-4 shadow-md
          border border-[#e6d3b3]
        `;

        card.innerHTML = `
          <h3 class="text-vinho font-bold text-lg mb-2">
            Pedido #${pedido.id}
          </h3>

          <p class="text-sm text-gray-700">
            <strong>Cliente:</strong> ${pedido.cliente}
          </p>

          <p class="text-sm text-gray-700 mt-1">
            <strong>Itens:</strong> ${pedido.itens.join(", ")}
          </p>
        `;

        container.appendChild(card);
      });

      contador.innerText = `${pedidos.length} pedidos`;
    }

    function renderErro() {
      const container = document.getElementById("pedidosContainer");
      const contador = document.getElementById("contador");

      container.innerHTML = `
        <div class="col-span-full flex flex-col items-center justify-center text-center bg-red-100 border border-red-300 text-red-800 p-6 rounded-xl shadow">
          
          <div class="text-3xl mb-2">⚠️</div>

          <h3 class="font-bold text-lg">
            Ops! Problema de conexão
          </h3>

          <p class="text-sm mt-1">
            Não foi possível carregar os pedidos do servidor.
          </p>

          <button onclick="carregarPedidos()"
            class="mt-4 bg-vinho text-white px-4 py-2 rounded-lg shadow">
            Tentar novamente
          </button>

        </div>
      `;

      contador.innerText = "--";
    }

    async function carregarPedidos() {
      if (!estaOnline) return;

      try {
        const response = await fetch("https://sua-api.com/pedidos");

        if (!response.ok) throw new Error();

        const pedidos = await response.json();

        renderPedidos(pedidos);

      } catch (error) {
        renderErro();
      }
    }

    window.onload = () => {
      atualizarStatusVisual();
    };
  </script>

</body>
</html>
